<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OJT Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header>
    <h1>OJT Progress Tracker</h1>
    <p>Track your daily learning & tasks</p>
  </header>

  <!-- DASHBOARD -->
  <section class="dashboard">
    <div class="card">
      <h3>Total</h3>
      <p id="total">0</p>
    </div>
    <div class="card">
      <h3>Completed</h3>
      <p id="completed">0</p>
    </div>
    <div class="card">
      <h3>Pending</h3>
      <p id="pending">0</p>
    </div>
  </section>

  <!-- FORM -->
  <form id="taskForm" class="form">
    <input type="text" id="title" placeholder="Enter task..." required />
    
    <select id="category">
      <option>Learning</option>
      <option>Project</option>
      <option>Debugging</option>
    </select>

    <input type="date" id="date" required />
    <button type="submit">Add Task</button>
  </form>

  <!-- TASK LIST -->
  <section id="taskList" class="task-list"></section>

</div>

<script src="script.js"></script>
</body>
</html>
