<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OJT Progress Tracker</title>

  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>OJT</h2>
    <ul>
      <li onclick="showDashboard()"><i class="fas fa-home"></i> Dashboard</li>
      <li onclick="scrollToTasks()"><i class="fas fa-tasks"></i> Tasks</li>
      <li onclick="toggleDarkMode()"><i class="fas fa-moon"></i> Dark Mode</li>
    </ul>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="app">

      <!-- HEADER -->
      <header>
        <h1>OJT Progress Tracker</h1>
        <p>Track your daily learning and tasks efficiently</p>
      </header>

      <!-- DASHBOARD -->
      <section class="dashboard">
        <div class="card">
          <h3>Total</h3>
          <p id="total">0</p>
        </div>

        <div class="card">
          <h3>Completed</h3>
          <p id="completed">0</p>
        </div>

        <div class="card">
          <h3>Pending</h3>
          <p id="pending">0</p>
        </div>
      </section>

      <!-- 🔥 TOOLBAR (ADD TASK) -->
      <form id="taskForm" class="toolbar">

        <input type="text" id="title" placeholder="Task..." required>

        <input type="date" id="date" required>

        <select id="category">
          <option>Learning</option>
          <option>Project</option>
          <option>Debugging</option>
        </select>

        <input type="text" id="description" class="desc" placeholder="Description...">

        <button type="submit">+ Add</button>

      </form>

      <!-- 🔥 FILTER + SORT -->
      <div class="controls">

        <select id="filter">
          <option value="all">All Tasks</option>
          <option value="completed">Completed</option>
          <option value="pending">Pending</option>
        </select>

        <select id="sort">
          <option value="newest">Sort by Newest Date</option>
          <option value="oldest">Sort by Oldest Date</option>
          <option value="az">Sort A-Z</option>
        </select>

      </div>

      <!-- TASK LIST -->
      <section id="taskList" class="task-list"></section>

    </div>
  </main>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
